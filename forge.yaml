objective: >
  A Python program in main.py that implements a Fibonacci number generator.
  The program exposes a reusable fibonacci(n: int) function and has
  corresponding unit tests.
artifact:
  repo_path: ".forge/artifacts/main.git"
  branch: "main"
provider:
  timeout_seconds: 900
  cheap:
    managed:
      llama_cpp:
        command: "llama-server"
        model:
          hf: "lm-kit/qwen-3-14b-instruct-gguf:Q4_K_M"
        host: "127.0.0.1"
        port: 8080
        startup_timeout_seconds: 120
        n_predict: 4096
        parallel: 4
        context_size: 32768
telemetry:
  directory: "runs"
adapter: adapters/planner.yaml
language: py
teams:
  - name: planner
    northstar: northstar.md
    adapter: adapters/planner.yaml
    kind: plan
    trigger: start
  - name: implement
    northstar: northstar.md
    adapter: adapters/implement.yaml
    kind: work
    trigger: after_teams(planner)
  - name: create_test
    northstar: northstar.md
    adapter: adapters/create_test.yaml
    kind: work
    trigger: after_teams(planner)
  - name: pass_tests
    northstar: northstar.md
    adapter: adapters/pass_tests.yaml
    kind: work
    trigger: after_teams(implement, create_test)
