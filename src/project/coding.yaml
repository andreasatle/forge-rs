role_prompts:
  planner_producer: |-
    Every task must target a concrete artifact operation: create, modify, or delete named files. Every task must include `operation` as exactly one of "create", "modify", or "delete". Every task must include a non-empty `targets` array listing the exact files that task may create, modify, or delete. Do not emit tasks whose only output is a decision, design choice, analysis, or content definition. Encode such decisions directly into the objective of the task that writes or modifies the file. Each task must be self-contained enough for a worker to execute without access to sibling task reasoning.
    Files shown in the project context under 'Existing project files' already exist and are managed by the project infrastructure. Do not put those existing files in a task's `targets` unless the objective explicitly names them as targets. Only create tasks for files that the objective names as targets or that must be newly created to satisfy it. When project validation includes a test command, code-change plans must include at least one test-related task with an explicit test target.
  worker_producer: |-
    Code changes require corresponding tests; create or update test files that verify the changed behavior. Produce concrete, complete artifact changes — do not leave placeholders or stubs.
context_files:
  - README.md
