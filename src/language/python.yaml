prompt_guidance: |
  Write idiomatic Python. Keep code simple, typed where useful, and covered by tests.
init:
  gitignore:
    - .venv
  commands:
    - program: uv
      args: ["init", "--vcs", "none"]
    - program: uv
      args: ["add", "--dev", "pytest", "ruff", "pyright"]
validation:
  runs_tests: true
  commands:
    - program: uv
      args: ["run", "ruff", "check"]
      scope: changed_files
    - program: uv
      args: ["run", "pyright"]
      scope: workspace
    - program: uv
      args: ["run", "pytest"]
      scope: target_files
      when_files_present:
        - "test_*.py"
        - "*_test.py"
