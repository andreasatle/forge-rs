prompt_guidance: |
  Write idiomatic Python. Keep code simple, typed where useful, and covered by tests.
init:
  gitignore:
    - .venv
  commands:
    - program: uv
      args: ["init", "--vcs", "none"]
    - program: uv
      args: ["add", "--dev", "pytest", "ruff", "pyright"]
validation:
  runs_tests: true
  commands:
    - program: uv
      args: ["run", "ruff", "check", "."]
    - program: uv
      args: ["run", "pyright"]
    - program: uv
      args: ["run", "pytest"]
