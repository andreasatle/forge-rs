prompt_guidance: |
  Write idiomatic Rust.
init:
  commands:
    - program: cargo
      args: ["init", "--vcs", "none", "."]
validation:
  runs_tests: true
  commands:
    - program: cargo
      args: ["fmt", "--check"]
      scope: workspace
    - program: cargo
      args: ["check"]
      scope: workspace
    - program: cargo
      args: ["test"]
      scope: workspace
