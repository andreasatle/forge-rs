extensions: [py]
identity: |
  You are writing idiomatic Python for this project.
context: |
  This project uses uv for dependency management, pytest for tests, ruff
  for linting, and pyright for type checking.
instructions: |
  Keep code simple, typed where useful, and covered by tests. Add type
  hints on function signatures and prefer explicit types over Any. Use
  standard import order: standard library, then third-party, then local
  imports, each group separated by a blank line. Place test files under
  the tests/ subdirectory, named tests/test_<module>.py, and name test
  functions test_<behavior_under_test> so failures read as a description
  of what broke.
constraints: |
  Do not use wildcard imports (from module import *) to bring the module
  under test into scope — import the specific functions or classes by name.
  Test files must be placed in the tests/ subdirectory, not alongside the
  source file, and named tests/test_<module>.py, following pytest convention.
  Name test functions test_<behavior_under_test>; do not use unittest.TestCase
  method names like test1 or testFoo.
init:
  gitignore:
    - .venv
    - __pycache__/
    - "*.pyc"
  commands:
    - program: uv
      args: ["init", "--vcs", "none"]
    - program: uv
      args: ["add", "--dev", "pytest", "ruff", "pyright"]
validation:
  runs_tests: true
  commands:
    - program: uv
      args: ["run", "ruff", "check"]
      scope: changed_files
    - program: uv
      args: ["run", "pyright"]
      scope: workspace
    - program: uv
      args: ["run", "pytest"]
      scope: target_files
      when_files_present:
        - "test_*.py"
        - "*_test.py"
  validation_targets:
    - pattern: "{stem}.py"
      target: "tests/test_{stem}.py"
plugin_roles:
  - plugin_role: tester
    validation:
      runs_tests: false
      commands:
        - program: uv
          args: ["run", "ruff", "check"]
          scope: changed_files
    name_target_rules:
      - pattern: "{name}"
        target: "tests/test_{name}.py"
  - plugin_role: implementer
    validation:
      runs_tests: true
      commands:
        - program: uv
          args: ["run", "ruff", "check"]
          scope: changed_files
        - program: uv
          args: ["run", "pyright"]
          scope: workspace
        - program: uv
          args: ["run", "pytest"]
          scope: target_files
          when_files_present:
            - "test_*.py"
            - "*_test.py"
      validation_targets:
        - pattern: "{stem}.py"
          target: "tests/test_{stem}.py"
name_target_rules:
  - pattern: "{name}"
    target: "src/{name}.py"
api_summary:
  program: uv
  args:
    - run
    - python
    - -c
    - |
      import ast
      import sys


      def format_arg(arg):
          annotation = f": {ast.unparse(arg.annotation)}" if arg.annotation is not None else ""
          return f"{arg.arg}{annotation}"


      def format_signature(node):
          parts = [format_arg(a) for a in node.args.args]
          signature = ", ".join(parts)
          returns = f" -> {ast.unparse(node.returns)}" if node.returns is not None else ""
          prefix = "async def" if isinstance(node, ast.AsyncFunctionDef) else "def"
          return f"{prefix} {node.name}({signature}){returns}:"


      def format_decorators(node, indent):
          return [f"{indent}@{ast.unparse(d)}" for d in node.decorator_list]


      def format_docstring(node, indent):
          doc = ast.get_docstring(node)
          if not doc:
              return []
          first_line = doc.strip().splitlines()[0]
          return [f'{indent}"""{first_line}"""']


      def format_function(node, indent=""):
          lines = format_decorators(node, indent)
          lines.append(f"{indent}{format_signature(node)}")
          lines.extend(format_docstring(node, indent + "    "))
          return lines


      def format_class(node):
          lines = format_decorators(node, "")
          bases = ", ".join(ast.unparse(b) for b in node.bases)
          header = f"class {node.name}({bases}):" if bases else f"class {node.name}:"
          lines.append(header)
          lines.extend(format_docstring(node, "    "))
          for child in node.body:
              if isinstance(child, (ast.FunctionDef, ast.AsyncFunctionDef)):
                  lines.extend(format_function(child, indent="    "))
          return lines


      path = sys.argv[1]
      with open(path, encoding="utf-8") as f:
          source = f.read()
      tree = ast.parse(source)

      lines = []
      for node in tree.body:
          if isinstance(node, (ast.FunctionDef, ast.AsyncFunctionDef)):
              lines.extend(format_function(node))
          elif isinstance(node, ast.ClassDef):
              lines.extend(format_class(node))
      print("\n".join(lines))
