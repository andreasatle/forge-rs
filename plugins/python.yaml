prompt_guidance: |
  Write idiomatic Python. Keep code simple, typed where useful, and covered
  by tests. Add type hints on function signatures and prefer explicit types
  over Any. Use standard import order: standard library, then third-party,
  then local imports, each group separated by a blank line; avoid wildcard
  imports. Place test files under the tests/ subdirectory, named
  tests/test_<module>.py, and name test functions
  test_<behavior_under_test> so failures read as a description of what
  broke.
constraints: |
  Do not use wildcard imports (from module import *). Import the functions
  or classes under test directly from the source module — do not reimplement
  or copy their logic into the test file. Test files must be placed in the
  tests/ subdirectory, not alongside the source file, and named
  tests/test_<module>.py, following pytest convention. Name test functions
  test_<behavior_under_test>; do not use unittest.TestCase method names like
  test1 or testFoo.
init:
  gitignore:
    - .venv
    - __pycache__/
    - "*.pyc"
  commands:
    - program: uv
      args: ["init", "--vcs", "none"]
    - program: uv
      args: ["add", "--dev", "pytest", "ruff", "pyright"]
validation:
  runs_tests: true
  commands:
    - program: uv
      args: ["run", "ruff", "check"]
      scope: changed_files
    - program: uv
      args: ["run", "pyright"]
      scope: workspace
    - program: uv
      args: ["run", "pytest"]
      scope: target_files
      when_files_present:
        - "test_*.py"
        - "*_test.py"
  validation_targets:
    - pattern: "{stem}.py"
      target: "tests/test_{stem}.py"
roles:
  - role: tester
    validation:
      runs_tests: false
      commands:
        - program: uv
          args: ["run", "ruff", "check"]
          scope: changed_files
  - role: implementer
    validation:
      runs_tests: true
      commands:
        - program: uv
          args: ["run", "ruff", "check"]
          scope: changed_files
        - program: uv
          args: ["run", "pyright"]
          scope: workspace
        - program: uv
          args: ["run", "pytest"]
          scope: target_files
          when_files_present:
            - "test_*.py"
            - "*_test.py"
      validation_targets:
        - pattern: "{stem}.py"
          target: "tests/test_{stem}.py"
