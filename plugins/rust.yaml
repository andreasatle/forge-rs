prompt_guidance: |
  Write idiomatic Rust. Prefer owned types and explicit structs/enums over
  hidden mutation or unnecessary lifetimes. Model failure with Result and
  typed error enums; reserve panics for genuine invariant violations, not
  expected failure paths. Use ? for propagation rather than manual matching
  on every call site. Put unit tests inline in the same file under
  #[cfg(test)] mod tests; put integration tests that exercise the public API
  as a separate file under tests/.
constraints: |
  Put unit tests inline in the same file under a #[cfg(test)] mod tests
  block, using `use super::*;` to bring the module under test into scope —
  do not reimplement or copy the functions under test into the test module.
  Do not use unwrap() or expect() to handle expected failure paths in
  non-test code; propagate errors with Result and the ? operator instead.
  Reserve panics for genuine invariant violations.
init:
  commands:
    - program: cargo
      args: ["init", "--vcs", "none", "."]
validation:
  runs_tests: true
  commands:
    - program: cargo
      args: ["fmt", "--check"]
      scope: workspace
    - program: cargo
      args: ["check"]
      scope: workspace
    - program: cargo
      args: ["test"]
      scope: workspace
  validation_targets:
    - pattern: "{stem}.rs"
      target: "{stem}_test.rs"
roles:
  - role: tester
    validation:
      runs_tests: false
      commands:
        - program: cargo
          args: ["fmt", "--check"]
          scope: workspace
  - role: implementer
    validation:
      runs_tests: true
      commands:
        - program: cargo
          args: ["fmt", "--check"]
          scope: workspace
        - program: cargo
          args: ["check"]
          scope: workspace
        - program: cargo
          args: ["test"]
          scope: workspace
      validation_targets:
        - pattern: "{stem}.rs"
          target: "{stem}_test.rs"
