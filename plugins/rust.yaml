extensions: [rs]
identity: |
  You are writing idiomatic Rust for this project.
context: |
  This project uses cargo for building, formatting, and testing.
instructions: |
  Prefer owned types and explicit structs/enums over hidden mutation or
  unnecessary lifetimes. Model failure with Result and typed error enums;
  reserve panics for genuine invariant violations, not expected failure
  paths. Use ? for propagation rather than manual matching on every call
  site. Put unit tests inline in the same file under #[cfg(test)] mod
  tests; put integration tests that exercise the public API as a separate
  file under tests/.
constraints: |
  Put unit tests inline in the same file under a #[cfg(test)] mod tests
  block, using `use super::*;` to bring the module under test into scope.
  Do not use unwrap() or expect() to handle expected failure paths in
  non-test code; propagate errors with Result and the ? operator instead.
  Reserve panics for genuine invariant violations.
init:
  commands:
    - program: cargo
      args: ["init", "--vcs", "none", "."]
validation:
  runs_tests: true
  commands:
    - program: cargo
      args: ["fmt", "--check"]
      scope: workspace
    - program: cargo
      args: ["check"]
      scope: workspace
    - program: cargo
      args: ["test"]
      scope: workspace
  validation_targets:
    - pattern: "{stem}.rs"
      target: "{stem}_test.rs"
functions:
  lint:
    program: cargo
    args: ["fmt", "--check"]
    scope: workspace
  typecheck:
    program: cargo
    args: ["check"]
    scope: workspace
  test:
    program: cargo
    args: ["test"]
    scope: workspace
api_summary:
  program: sh
  args:
    - -c
    - |
      grep -nE '^[[:space:]]*pub (fn|struct|enum|trait)[[:space:]]' "$0" \
        | sed -E 's/^[0-9]+:[[:space:]]*//' \
        | sed -E 's/[[:space:]]*\{[[:space:]]*$//'
