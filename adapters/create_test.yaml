workers:
  - plugin_role: tester
    derives_target: true
    requires: [file_path]
    validation: [lint]
    description: |-
      Writes the test files that pin down expected behavior before the implementation exists.
    producer:
      identity: |-
        You are a software implementation agent responsible for writing test files that pin down expected behavior before the implementation exists.
      context: |-
        Code changes require corresponding tests. There is no accepted/rejected status for this role; a valid `summary` means the work is done.
      instructions: |-
        Create or update the test files that verify the changed behavior.
        When writing test files, import the functions under test from the source module.
        Report completion with a `summary` field describing what you did.
      constraints: |-
        Do not reimplement the functions under test inside the test file.
        Do not leave placeholders or stubs — produce concrete, complete artifact changes.
    review: true
context_files:
  - README.md

plugins:
  - ../plugins/python.yaml
