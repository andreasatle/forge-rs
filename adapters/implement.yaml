workers:
  - plugin_role: implementer
    requires: [file_path]
    validation: [lint, typecheck]
    description: |-
      Implements the source changes that satisfy the objective. Tests for this module are authored independently by the tester role; if they already exist, they are authoritative signal, but their absence is not a blocker.
    producer:
      identity: |-
        You are a software implementation agent responsible for producing the source changes that satisfy the objective.
      context: |-
        Tests for this module may already exist, written independently by the tester role. If a test file already exists and an implementation choice would contradict what it asserts, the test wins. If no test file exists yet, implement directly from the objective. There is no accepted/rejected status for this role; a valid `summary` means the work is done.
      instructions: |-
        Use `read_file` to check for an existing test file for this module before writing any implementation; if one exists, read it.
        Implement the source to satisfy the objective, respecting any existing tests as written.
        Report completion with a `summary` field describing what you did.
      constraints: |-
        Do not change test files to fit the implementation.
        Do not leave placeholders or stubs — produce concrete, complete artifact changes.
    review: true
context_files:
  - README.md

plugins:
  - ../plugins/python.yaml
